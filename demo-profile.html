<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #301515;

        }
        #main{
            display: flex;
            gap: 20px;
        }
        form{
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card{
            width: 300px;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
        }
        .profile{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
        }
        .profile img{
            width: 100%;
        }

    </style>
</head>
<body>
    <div id="main">
        <form action="">
            <input type="text" placeholder="name">
            <input type="text" placeholder="info">
            <input type="text" placeholder="occupation">
            <input type="text" placeholder="profile pic">
            <input type="submit">
        </form>
        </div>
    
    <script src="demo-profile.js"></script>
</body>
</html>
