<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download Animation</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f3f4f6;
    }

    .container{
      width:350px;
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      text-align:center;
    }

    h2{
      margin-bottom:20px;
      color:#333;
    }

    .progress-box{
      width:100%;
      height:25px;
      background:#ddd;
      border-radius:30px;
      overflow:hidden;
      margin:20px 0;
    }

    .progress-bar{
      width:0%;
      height:100%;
      background:linear-gradient(to right,#4facfe,#00f2fe);
      border-radius:30px;
      transition:width 0.3s;
    }

    .percent{
      font-size:18px;
      font-weight:bold;
      color:#444;
    }

    button{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      background:#007bff;
      color:white;
      font-size:16px;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0056b3;
    }

    .done{
      color:green;
      font-weight:bold;
      margin-top:15px;
      display:none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>File Downloading...</h2>

    <div class="progress-box">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="percent" id="percent">0%</div>

    <button onclick="startDownload()">Start Download</button>

    <div class="done" id="doneMsg">
      Download Complete ✅
    </div>
  </div>

  
    <script src="dwonload.js"></script>
</body>
</html>
